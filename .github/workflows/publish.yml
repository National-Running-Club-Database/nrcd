name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
      - name: Verify wheel contains package code
        run: |
          python - <<'PY'
          import glob
          import sys
          import zipfile

          wheel = next(glob.glob("dist/*.whl"))
          names = zipfile.ZipFile(wheel).namelist()
          if "nrcd/__init__.py" not in names:
              print("Wheel is missing nrcd package code:", names)
              sys.exit(1)
          PY
      - uses: pypa/gh-action-pypi-publish@release/v1
